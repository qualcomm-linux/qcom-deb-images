{{- $xfcedesktop := or .xfcedesktop "false" }}
{{- $localdebs := or .localdebs "none" }}
{{- $aptlocalrepo := or .aptlocalrepo "none" }}
{{- $kernelpackage := or .kernelpackage "linux-image-arm64" }}
{{- $overlays := or .overlays "qsc-deb-releases" }}
{{- $buildid := or .buildid "" }}
{{- $suite := or .suite "trixie" }}
{{- $distro := or .distro "debian" }}
{{- $username := or .username $distro }}
{{- $hostname := or .hostname $distro }}

{{- $variantid := "console" }}
{{- if eq $xfcedesktop "true" }}
{{- $variantid = "xfce" }}
{{- end }}

architecture: arm64

actions:
  - action: mmdebstrap
    description: Bootstrap initial filesystem
    suite: {{ $suite }}
    components:
{{ if eq $distro "ubuntu" }}
      - main
      - universe
      - restricted
      - multiverse
    mirrors: ['http://ports.ubuntu.com/ubuntu-ports']
{{ else }}
      - main
      - contrib
      - non-free
      - non-free-firmware
    mirrors: ['http://deb.debian.org/debian']
{{ end }}
    variant: minbase
    # ca-certificates required in early bootstrap for possible https apt overlays later
    # wget is needed to probe overlay suite availability later in the build
{{ if eq $distro "ubuntu" }}
    include: [ca-certificates, ubuntu-keyring, wget]
{{ else }}
    include: [ca-certificates, wget]
{{ end }}

{{- if ne $aptlocalrepo "none" }}
  - action: run
    description: Setup bind mount of local APT repository
    chroot: false
    command: |
      set -eux
      mkdir -v "${ROOTDIR}/media/apt-local-repo"
      mount --bind {{$aptlocalrepo}} "${ROOTDIR}/media/apt-local-repo"

  - action: run
    description: Setup APT sources for local APT repository
    chroot: true
    command: |
      set -eux
      cat >/etc/apt/sources.list.d/apt-local-repo.sources <<EOF
      Types: deb
      URIs: file:///media/apt-local-repo
      Suites: /
      Trusted: true
      EOF
{{- end }}

  # after debootstrap, only a basic etc/apt/sources.list is created; add more
  # modern etc/apt/sources.list.d/ .sources; sources.list is removed after
  # applying all overlays, and followed by an APT update and full-upgrade
  - action: run
    description: Create APT sources for {{ $distro }} {{ $suite }}
    chroot: true
    command: |
      set -eux
{{ if eq $distro "debian" }}
      cat >/etc/apt/sources.list.d/debian.sources <<EOF
      # Debian archive
      Types: deb
      URIs: http://deb.debian.org/debian/
      Suites: {{ $suite }}
      Components: main contrib non-free non-free-firmware
      Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg

      # Debian stable updates
      Types: deb
      URIs: http://deb.debian.org/debian/
      Suites: {{ $suite }}-updates
      Components: main contrib non-free non-free-firmware
      Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg

      # Debian security updates
      Types: deb
      URIs: http://deb.debian.org/debian-security/
      Suites: {{ $suite }}-security
      Components: main contrib non-free non-free-firmware
      Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg
      EOF
{{ else if eq $distro "ubuntu" }}
      cat >/etc/apt/sources.list.d/ubuntu.sources <<EOF
      # Ubuntu archive
      Types: deb
      URIs: http://ports.ubuntu.com/ubuntu-ports/
      Suites: {{ $suite }}
      Components: main universe restricted multiverse
      Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

      # Ubuntu updates
      Types: deb
      URIs: http://ports.ubuntu.com/ubuntu-ports/
      Suites: {{ $suite }}-updates
      Components: main universe restricted multiverse
      Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

      # Ubuntu security updates
      Types: deb
      URIs: http://ports.ubuntu.com/ubuntu-ports/
      Suites: {{ $suite }}-security
      Components: main universe restricted multiverse
      Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
      EOF
{{ end }}

{{ if eq $distro "debian" }}
  - action: run
    description: Add Debian {{ $suite }}-backports APT configuration
    chroot: true
    command: |
      set -eux
      cat >/etc/apt/sources.list.d/debian-backports.sources <<EOF
      # Debian backports
      Types: deb
      URIs: http://deb.debian.org/debian
      Suites: {{ $suite }}-backports
      Components: main contrib non-free non-free-firmware
      Enabled: yes
      Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg
      EOF
      cat >/etc/apt/preferences.d/debian-backports.pref <<EOF
      # for binary packages built from these source packages, score the version from
      # Debian backports higher as to get hardware enabled or better hardware support

      Package: src:alsa-ucm-conf:any src:firmware-free:any src:firmware-nonfree:any src:linux:any src:linux-signed-arm64:any src:mesa:any src:u-boot-efi-dtb
      Pin: release n={{ $suite }}-backports
      Pin-Priority: 900
      EOF
{{ end }}

{{- if $overlays }}
{{- range $overlay := split "," $overlays }}
  - action: overlay
    description: Apply overlay {{$overlay}}
    source: overlays/{{$overlay}}
{{- end }}
{{- end }}

  # The qsc-deb-releases overlay only ships the keyring (.asc); generate the
  # .sources and .pref files dynamically to use the correct $suite-overlay.
  # The .sources is initially created with Enabled: no, and only enabled after
  # verifying the suite exists in the repository (wget probe of Release file).
  - action: run
    description: Create qsc-deb-releases APT sources for {{ $suite }}-overlay
    chroot: true
    command: |
      set -eux
      # only generate if the keyring was installed by the overlay
      if [ -f /etc/apt/keyrings/qsc-deb-releases.asc ]; then
        cat >/etc/apt/sources.list.d/qsc-deb-releases.sources <<EOF
      # QArtifactory qsc-deb-releases repository
      # NB: publishing Sources indices for deb-src isn't supported by Artifactory,
      # but sources are published with other packages files
      Types: deb
      URIs: https://qartifactory-edge.qualcomm.com/artifactory/qsc-deb-releases
      Suites: {{ $suite }}-overlay
      Components: main
      Signed-By: /etc/apt/keyrings/qsc-deb-releases.asc
      Enabled: no
      EOF
        cat >/etc/apt/preferences.d/qsc-deb-releases.pref <<EOF
      # for binary packages built from these source packages, score the version from
      # {{ $suite }}-overlay higher than versions from Debian for compliance
      Package: src:pipewire:any
      Pin: release n={{ $suite }}-overlay
      Pin-Priority: 950
      EOF
        # verify the overlay suite exists before enabling it
        if wget -q --spider \
            "https://qartifactory-edge.qualcomm.com/artifactory/qsc-deb-releases/dists/{{ $suite }}-overlay/Release"; then
          sed -i 's/^Enabled: no$/Enabled: yes/' /etc/apt/sources.list.d/qsc-deb-releases.sources
        else
          echo "WARNING: {{ $suite }}-overlay not found in qsc-deb-releases, leaving disabled"
        fi
      fi

  - action: run
    description: Remove old APT sources and upgrade packages
    chroot: true
    command: |
      set -eux
      # remove old style, incomplete sources, superseded in apt-sources overlay
      rm -vf /etc/apt/sources.list
      # APT update and upgrade to pickup changes from overlays
      apt-get -y update
      apt-get -y full-upgrade

  - action: apt
    description: Install foundational packages
    recommends: true
    packages:
{{ if ne $suite "noble" }}
      # Android Debug Bridge (daemon); not available in Ubuntu noble
      - adbd
{{ end }}
      # bluetooth
      - bluez
      # vfat tools, notably fsck.fat for the ESP
      - dosfstools
      # ext4 tools, notably e2fsck for the root filesystem
      - e2fsprogs
{{ if eq $distro "debian" }}
      # fastrpc support; not available in Ubuntu noble nor in resolute
      - fastrpc-support
{{ end }}
      # fwupd tools, enable OTA EFI firmware capsule updates
      - fwupd
      # defaults to "systemd-sysv"; perhaps not needed
      - init
      # Bluetooth audio support in PipeWire
      - libspa-0.2-bluetooth
      # libcamera support in PipeWire
      - libspa-0.2-libcamera
      # Ethernet, Wi-Fi, WWAN; built-in DHCP client
      - network-manager
      # standard networking files (/etc/hosts, /etc/services etc.)
      - netbase
      # audio
      - pipewire
      # Qualcomm Remote Filesystem Service; needed for WiFi on
      # some ath10k devices such as on RB1
      - rmtfs
      # TFTP server implementation for the QRTR protocol; needed for WiFi on
      # some ath10k devices such as on RB1
      - tqftpserv
      # dynamic device nodes handling
      - udev
      # database of radio emission regulations; needed for WiFi
      - wireless-regdb
      # WPA / WPA2 / WPA3 client support
      - wpasupplicant

{{ if eq $suite "trixie" }}
  # fastrpc-tests is only available in trixie-overlay
  - action: apt
    description: Install fastrpc-tests (trixie only)
    recommends: true
    packages:
      - fastrpc-tests
{{ end }}

  - action: run
    description: Set hostname to "{{ $hostname }}"
    chroot: true
    command: |
      set -eux
      echo {{ $hostname }} >/etc/hostname
      # /etc/hosts is created by netbase
      sed -i "1s/^/127.0.1.1\t{{ $hostname }}\n/" /etc/hosts

  - action: run
    description: Add a "{{ $username }}" user, add it to sudoers and various groups
    chroot: true
    command: |
      set -eux
      # pre-emptively create a sudo group if sudo isn't installed
      getent group sudo >/dev/null 2>&1 || groupadd --system sudo
      # some useful groups for desktop scenarios, but also to run payloads
      # from the serial console, over SSH, or in containers - where the desktop
      # session has not updated ACLs to the device nodes
      groups="adm,audio,render,sudo,users,video"
      # fastrpc group only exists when fastrpc-support is installed (Debian)
      if getent group fastrpc >/dev/null 2>&1; then
        groups="${groups},fastrpc"
      fi
      useradd --create-home --shell /bin/bash --user-group \
          --groups "$groups" {{ $username }}
      # set password to "{{ $username }}"
      echo {{ $username }}:{{ $username }} | chpasswd
      # password must be changed on first login
      chage --lastday 0 {{ $username }}
      # add to sudoers
      mkdir -v --mode 755 --parents /etc/sudoers.d
      # subshell to override umask
      (
        umask 226
        echo "{{ $username }} ALL=(ALL) NOPASSWD:ALL" >/etc/sudoers.d/90-debos
      )

  # NB: Recommends pull in way too many packages, and we don't need to follow
  # Recommends reaching outside of each Priority level
{{ if eq $distro "debian" }}
  - action: apt
    description: Install packages of priority "important" (only from Debian)
    recommends: false
    packages:
      - ?origin(Debian) ?priority(important)

  - action: apt
    description: Install packages of priority "standard" (only from Debian)
    recommends: false
    packages:
      - ?origin(Debian) ?priority(standard)
{{ else if eq $distro "ubuntu" }}
  - action: apt
    description: Install packages of priority "important" (from Ubuntu)
    recommends: false
    packages:
      - ?origin(Ubuntu) ?priority(important)

  - action: apt
    description: Install packages of priority "standard" (from Ubuntu)
    recommends: false
    packages:
      - ?origin(Ubuntu) ?priority(standard)
{{ end }}

  # TODO remove Priority: standard packages from this list?
  - action: apt
    description: Install a comfortable package set
    recommends: true
    packages:
      - alsa-utils
      - clinfo
{{ if ne $suite "noble" }}
      # used to debug clock issues; not available in Ubuntu noble
      - debugcc
{{ end }}
      - device-tree-compiler
      - docker.io
      # used to debug ethernet speed auto-neg issues
      - ethtool
      - i2c-tools
      - locales
      - mesa-opencl-icd
      - mesa-utils-bin
      # convenience networking commands (arp, ifconfig, route etc.)
      - net-tools
      - openssh-client
      # lspci
      - pciutils
      - rfkill
      - sudo
      # lsusb
      - usbutils
      # media-ctl
      - v4l-utils
      - vim
      - vulkan-tools
      - wget

  - action: run
    description: Add default user to docker group
    chroot: true
    command: |
      set -eux
      usermod -a -G docker {{ $username }}

{{- if eq $xfcedesktop "true" }}
  # this should ideally be task-xfce-desktop, but this pulls too many apps;
  # instead, curate from the Depends and Recommends of task-xfce-desktop and
  # task-desktop recursively; also, disable Recommends
  - action: apt
    description: Install Xfce desktop
    recommends: false
    packages:
      # preempt these dependencies as to avoid pulling all backends
      - xserver-xorg-input-libinput
      - xserver-xorg-video-fbdev
      - xserver-xorg-input-all-
      - xserver-xorg-video-all-
      - xserver-xorg
      - plymouth-label- # we probably don't need a boot splash
      # nm-connection-editor below depends on polkit-1-auth-agent, and APT
      # picks up ukui-polkit as a random Provides; select mate-polkit instead
      - mate-polkit
      # from task-xfce-desktop
      - xfce4
      - lightdm
      - light-locker
      - xfce4-terminal
      - tango-icon-theme
{{ if eq $suite "noble" }}
      # on Ubuntu noble, applet and connection editor are in network-manager-gnome
      - network-manager-gnome
{{ else }}
      - network-manager-applet
      - nm-connection-editor
{{ end }}
      - synaptic
      # from task-desktop
      - desktop-base
      - xdg-utils
      - fonts-symbola
      - avahi-daemon
      - libnss-mdns
      # browser
      - chromium
      # bluetooth settings
      - blueman
      # audio: wireplumber for session integration, pipewire-pulse for chromium
      # and xfce4-pulseaudio-plugin, and pavucontrol as referenced from the
      # xfce pulse panel applet
      - pavucontrol
      - pipewire-pulse
      - wireplumber
      # camera: mostly supported through pipewire, but pull the qcam app
      # and cam CLI tool from libcamera-tools; also install libcamera
      # gstreamer plugins for for gstreamer based apps; ideally, cam and
      # qcam would be packaged separately as to allow pulling the CLI
      # version outside of the desktop list. libcamera-v4l2 provides a
      # LD_PRELOAD library for compatiblity with apps relying on v4l2
      # (similar to pipewire and pulse situation)
      - gstreamer1.0-libcamera
      - libcamera-tools
      - libcamera-v4l2
{{- end }}

  - action: run
    description: Set default locale
    chroot: true
    command: |
      set -eux
      if which locale-gen >/dev/null 2>&1; then
          echo en_US.UTF-8 UTF-8 >>/etc/locale.gen
          locale-gen en_US.UTF-8 UTF-8
          update-locale LANG=en_US.UTF-8
      fi

{{- if ne $buildid "" }}
  - action: run
    description: Set build and variant ID in /etc/buildinfo
    chroot: true
    command: |
      set -eux
      touch /etc/buildinfo
      chmod 644 /etc/buildinfo
      echo "BUILD_ID={{$buildid}}" >>/etc/buildinfo
      echo "VARIANT_ID={{$variantid}}" >>/etc/buildinfo
{{- end }}

  # usually these packages are pulled by Pre-Depends/Depends/Recommends of
  # Debian's linux-image, but kernel packages generated with the upstream
  # deb-pkg target don't have these dependencies, so install these before
  # installing kernels; this is a separate step because of the Pre-Depends
  - action: apt
    description: Install kernel dependencies
    recommends: true
    packages:
      - apparmor
      - initramfs-tools
      - kmod
      - linux-base

{{ if eq $distro "debian" }}
  - action: apt
    description: Install firmware packages (Debian only)
    recommends: true
    packages:
      - firmware-atheros
      - firmware-qcom-soc
{{ end }}

  - action: apt
    description: Install kernel package
    recommends: true
    packages:
      - {{$kernelpackage}}

  # this is currently needed on boards such as RB1 which are using Android
  # bootloader to check the boot count of the boot_a/boot_b partitions
  - action: apt
    description: Support boards chainloading from Android bootloader
    recommends: true
    packages:
      # marks the current Android boot partition as booted successfully
      - qbootctl

{{- if ne $localdebs "none" }}
  - action: overlay
    description: Overlay local debs directory {{ $localdebs }} to /root/
    source: {{ $localdebs }}
    destination: /root/

  - action: run
    description: Install local debs from /root/
    chroot: true
    command: |
      set -eux
      apt-get -y install /root/*.deb
      # no need to keep these
      rm -vf /root/*.deb
{{- end }}

{{- if ne $aptlocalrepo "none" }}
  - action: run
    description: Remove bind mount of local APT repository
    chroot: false
    command: |
      set -eux
      umount "${ROOTDIR}/media/apt-local-repo"
      rmdir -v "${ROOTDIR}/media/apt-local-repo"

  - action: run
    description: APT update without local APT repository
    chroot: true
    command: |
      set -eux
      rm -v /etc/apt/sources.list.d/apt-local-repo.sources
      apt-get update
{{- end }}

  - action: run
    description: Create DTBs tarball
    chroot: false
    command: |
      set -eux
      # find the highest kernel version installed; kernels are backwards
      # compatible with older dtbs, so it would make sense to take dtbs from
      # the oldest available kernel as to allow all kernels to boot, but if
      # this image has pulled a more recent kernel, it's probably to gain
      # support for new hardware which would happen through new or updated dtbs
      # only in that new kernel, so use the latest dtbs
      latest_kernel="$(
          ls -d "$ROOTDIR"/usr/lib/linux-image-* | sort -V | tail -1)"
      # transform pathnames to strip the leading ./
      tar \
          -C "${latest_kernel}" \
          --transform='s|^\./||' \
          -cvzf "$ARTIFACTDIR/dtbs.tar.gz" \
          .

  - action: pack
    description: Create root filesystem tarball
    file: rootfs.tar
    compression: none

