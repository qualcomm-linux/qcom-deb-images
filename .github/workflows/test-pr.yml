name: Test PR build

run-name: "Tests triggered by PR: ${{ github.event.workflow_run.display_title }}"

on:
  workflow_run:
    workflows: ["Build on PR"]
    types:
      - completed

# implicitely set all other permissions to none
permissions:
  checks: write # lava-test.yml EnricoMi/publish-unit-test-result-action
  contents: read # lava-test.yml actions/checkout
  packages: read # lava-test.yml actions/download-artifact
  # lava-test.yml EnricoMi/publish-unit-test-result-action
  # thollander/actions-comment-pull-request
  pull-requests: write

jobs:
  retrieve-build-info:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}
    steps:
      - name: 'Download build-info artifacts'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const allArtifacts = await github.rest.actions.listWorkflowRunArtifacts({
               owner: context.repo.owner,
               repo: context.repo.repo,
               run_id: context.payload.workflow_run.id,
            });
            const infoArtifacts = allArtifacts.data.artifacts.filter(
              (a) => a.name.endsWith('-build-info')
            );
            const temp = '${{ runner.temp }}/artifacts';
            if (!fs.existsSync(temp)) {
              fs.mkdirSync(temp);
            }
            for (const a of infoArtifacts) {
              const download = await github.rest.actions.downloadArtifact({
                 owner: context.repo.owner,
                 repo: context.repo.repo,
                 artifact_id: a.id,
                 archive_format: 'zip',
              });
              fs.writeFileSync(
                path.join(temp, a.name + '.zip'),
                Buffer.from(download.data)
              );
            }

      - name: 'Collect build-info into matrix'
        id: collect
        run: |
          set -eu -o pipefail
          temp="${{ runner.temp }}/artifacts"
          entries='[]'
          for zip in "$temp"/*-build-info.zip; do
            [ -f "$zip" ] || continue
            name=$(basename "$zip" .zip)
            suite=${name%-build-info}
            mkdir -p "$temp/$suite"
            unzip -o -d "$temp/$suite" "$zip"
            url=$(cat "$temp/$suite/build-url.txt")
            boards=$(cat "$temp/$suite/boards.json")
            entries=$(jq -nc \
                --argjson e "$entries" \
                --arg s "$suite" \
                --arg u "$url" \
                --arg b "$boards" \
                '$e + [{suite: $s, url: $u, boards_json: $b}]')
          done
          matrix=$(jq -nc --argjson i "$entries" '{include: $i}')
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  test:
    needs: retrieve-build-info
    if: ${{ needs.retrieve-build-info.outputs.matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.retrieve-build-info.outputs.matrix) }}
    uses: ./.github/workflows/lava-test.yml
    secrets: inherit
    with:
      suite: ${{ matrix.suite }}
      url: ${{ matrix.url }}
      boards_json: ${{ matrix.boards_json }}

  publish-test-results:
    name: "Publish Tests Results"
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Download event file
        uses: actions/download-artifact@v8.0.1
        with:
            run-id: ${{ github.event.workflow_run.id }}
            path: artifacts
            github-token: ${{ github.token }}

      - name: "List files"
        run: |
          echo $GITHUB_WORKSPACE
          ls -R $GITHUB_WORKSPACE

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          commit: ${{ github.event.workflow_run.head_sha }}
          event_file: artifacts/Event File/event.json
          event_name: ${{ github.event.workflow_run.event }}
          files: "${{ github.workspace }}/artifacts/**/*.xml"

      - name: Prepare PR comment
        id: pr_comment_prep
        run: |
          echo "## Test jobs for commit ${{ github.event.workflow_run.head_sha }}" > pr-comment.txt
          for json_file in $(find ${{ github.workspace }} -name "test-job-*.json")
          do
              DEVICE_TYPE=$(cat "$json_file" | jq -r ".requested_device_type")
              URL=$(cat "$json_file" | jq -r ".url")
              JOB_ID=$(cat "$json_file" | jq -r ".id")
              echo " * [Job $JOB_ID on $DEVICE_TYPE]($URL)"
              echo " * [Job $JOB_ID on $DEVICE_TYPE]($URL)" >> pr-comment.txt
          done
          PR_NUMBER=$(cat "artifacts/Event File/event.json" | jq -r ".number")
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: thollander/actions-comment-pull-request@v3
        with:
          file-path: pr-comment.txt
          pr-number: ${{ steps.pr_comment_prep.outputs.pr_number }}
