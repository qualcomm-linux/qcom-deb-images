name: Build on push to branch

on:
  push:
    branches: [main]

# implicitely set all other permissions to none
permissions:
  checks: write # lava-test.yml
  contents: read # debos.yml lava-schema-check.yml lava-test.yml
  packages: read # lava-test.yml
  pull-requests: write # lava-test.yml

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            suite: trixie
          - distro: debian
            suite: forky
          - distro: ubuntu
            suite: noble
          - distro: ubuntu
            suite: resolute
    with:
      suite: ${{ matrix.suite }}
    uses: ./.github/workflows/debos.yml
  schema-check:
    uses: ./.github/workflows/lava-schema-check.yml
  test:
    uses: ./.github/workflows/lava-test.yml
    needs: [build, schema-check]
    secrets: inherit
    with:
      url: ${{ needs.build.outputs.artifacts_url }}
