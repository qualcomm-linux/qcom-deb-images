name: Tests

on:
  workflow_call:
    inputs:
      url:
        required: true
        type: string
      build_id:
        required: true
        type: string
      suite:
        description: Distribution suite (e.g. trixie, forky)
        type: string
        default: trixie
      boards_include:
        description: JSON array of board names to include (empty = all boards)
        type: string
        default: ''
    outputs:
      summary_ids:
        description: "IDs of the test summary artifact"
        value: ${{ jobs.collect-ids.outputs.summary_ids }}

# implicitely set all other permissions to none
permissions:
  checks: write # EnricoMi/publish-unit-test-result-action
  contents: read # actions/checkout
  packages: read # actions/download-artifact
  pull-requests: write # EnricoMi/publish-unit-test-result-action

env:
  BUILD_URL: ${{ inputs.url }}
  LAVA_CI: ci/lava/
  SUITE: ${{ inputs.suite }}
  BOARDS_INCLUDE: ${{ inputs.boards_include }}
  # git sha, tag or branch in lava-test-plans repository
  LAVA_TEST_PLANS_REF: "b9de72b563d8b361b39075c6070d76010040660e"

jobs:
  prepare-env:
    name: Prepare environment
    runs-on: ubuntu-latest
    steps:
      - name: "Print ref"
        shell: bash
        run: |
          echo "lava-test-plans ref: ${{ env.LAVA_TEST_PLANS_REF }}"
    outputs:
      lava-test-plans-ref: "${{ env.LAVA_TEST_PLANS_REF }}"
  test-debian:
    needs: [prepare-env]
    name: "Test nodistro"
    uses: mwasilew/meta-qcom/.github/workflows/test-distro.yml@debian-support
    secrets: inherit
    with:
      build_id: "${{ inputs.build_id }}"
      devices: "${{ inputs.boards_include }}"
      project_name: "qcom-deb-images"
      distro_name: "debian"
      lava_test_plans_ref: "${{ needs.prepare-env.outputs.lava-test-plans-ref }}"

  collect-ids:
    name: "Collect Summary artifact IDs"
    needs: [test-nodistro, test-qcom-distro, test-qcom-distro_linux-qcom-6-18]
    if: |
      always()
      && contains(needs.*.result, 'success')
      && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    outputs:
      summary_ids: ${{ steps.generate-summary.outputs.artifact_ids }}
    steps:
      - name: Summary IDs
        id: generate-summary
        run: |
          echo "artifact_ids=${{ needs.test-nodistro.outputs.summary_id }},${{ needs.test-qcom-distro.outputs.summary_id }},${{ needs.test-qcom-distro_linux-qcom-6-18.outputs.summary_id }}" >> $GITHUB_OUTPUT
