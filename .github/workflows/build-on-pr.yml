name: Build on PR

on:
  pull_request:

# implicitely set all other permissions to none
permissions:
  contents: read # debos.yml lava-schema-check.yml

jobs:
  event-file:
    name: "Upload event file"
    runs-on: ubuntu-latest
    steps:
    - name: Upload
      uses: actions/upload-artifact@v7
      with:
        name: Event File
        path: ${{ github.event_path }}

  build:
    strategy:
      fail-fast: false
      matrix:
        suite: [trixie, forky]
        kernelpackage: [default-ci, linux-image-arm64]
        exclude:
          - suite: trixie
            kernelpackage: linux-image-arm64
          - suite: forky
            kernelpackage: default-ci
    uses: ./.github/workflows/debos.yml
    with:
      suite: ${{ matrix.suite }}
      kernelpackage: ${{ matrix.kernelpackage }}
  schema-check:
    uses: ./.github/workflows/lava-schema-check.yml
