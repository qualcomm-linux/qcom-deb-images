name: Daily Build

on:
  # run daily at 8:30am
  schedule:
    - cron: '30 8 * * *'
  # allow manual runs
  workflow_dispatch:

# implicitely set all other permissions to none
permissions:
  checks: write # lava-test.yml
  contents: read # debos.yml lava-test.yml
  packages: read # lava-test.yml
  pull-requests: write # lava-test.yml

jobs:
  build-daily:
    # don't run cron from forks of the main repository or from other branches
    if: github.repository == 'qualcomm-linux/qcom-deb-images' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        suite: [trixie, forky]
    uses: ./.github/workflows/debos.yml
    with:
      suite: ${{ matrix.suite }}

  test-daily:
    # don't run cron from forks of the main repository or from other branches
    if: github.repository == 'qualcomm-linux/qcom-deb-images' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        suite: [trixie, forky]
    uses: ./.github/workflows/lava-test.yml
    needs: build-daily
    secrets: inherit
    with:
      url: ${{ needs.build-daily.outputs.artifacts_url }}
      suite: ${{ matrix.suite }}
      # qrb2210-rb1 can't boot forky pending a newer kernel; see #424
      # glymur-crd can't boot anything
      # monaco-evk only validated against the linux-next/qcom-next/monza
      # kernels so far, not the distro kernel; see
      # https://github.com/qualcomm-linux/qcom-deb-images/issues/440
      boards_exclude: ${{ (matrix.suite == 'forky' && '["qrb2210-rb1", "glymur-crd", "monaco-evk"]') || '["glymur-crd", "monaco-evk"]' }}
